<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #1a0929;
      color: #fff;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 70px;
    }

    .header {
      background: linear-gradient(160deg, #64248d 0%, #40175d 100%);
      padding: 40px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      color: #fff;
    }

    .header h1 span {
      color: #c169d6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 20px;
    }

    .stat {
      background: #2a1140;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      color: #c169d6;
      font-weight: bold;
    }

    .stat-label {
      font-size: 12px;
      color: #b89eca;
      margin-top: 5px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      display: flex;
      background: #2a1140;
      border-top: 1px solid rgba(193,105,214,0.2);
    }

    .nav button {
      flex: 1;
      padding: 15px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
    }

    .nav button:hover {
      background: #341550;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Lin<span>go</span></h1>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="st-total">0</div>
      <div class="stat-label">Palabras</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="st-learned">0</div>
      <div class="stat-label">Aprendidas</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="st-sentences">0</div>
      <div class="stat-label">Frases</div>
    </div>
  </div>

  <div class="nav">
    <button>Inicio</button>
    <button>Vocabulario</button>
    <button>Agregar</button>
    <button>Ajustes</button>
  </div>

  <script>
    const words = [
      { en: 'abandoned', status: 'learning' },
      { en: 'absence', status: 'learning' },
      { en: 'accompany', status: 'learned' }
    ];

    const sentences = [
      { es: 'Ella trabaja en una empresa grande.' },
      { es: 'A veces le cuesta concentrarse.' }
    ];

    function updateStats() {
      document.getElementById('st-total').textContent = words.length;
      document.getElementById('st-learned').textContent =
        words.filter(w => w.status === 'learned').length;
      document.getElementById('st-sentences').textContent = sentences.length;
    }

    function load() {
      updateStats();
    }

    load();
  </script>

</body>
</html>
